<!doctype html>
<html lang="en">
<head>
    <title> assignment 6 : image 1</title>
    <style>
        body {
          margin: 0;
          padding: 0;
          height: 100vh;
          display: flex;
          flex-direction: column;
          /* Dark Blue from the screenshot side panels */
          background-color: #CCCCCC;
          overflow: hidden;
         }

        .image-area {
          flex: 1;
          display: flex;
          justify-content: center;
          align-items: center;
          overflow: hidden;
         }

        .image-area img {
          max-width: 100%;
          max-height: 100%;
          object-fit: contain;
          display: block;
         }

        .analysis-block {
          width: 100vw;
          /* Grey from the screenshot background */
          background-color: #194D8C;
          padding: 25px 5%;
          box-sizing: border-box;
          flex-shrink: 0;
          /* Magenta-purple from the eye lids */
          border-top: 1px solid #9E2A8E;
        }

        .analysis-block p {
          /* Dark Blue for readability on the grey background */
          color: #9E2A8E;
          margin: 0 auto;
          max-width: 1000px;
          line-height: 1.6;
          font-family: sans-serif;
         }

        a {
          display: flex;
          height: 100%;
          width: 100%;
          justify-content: center;
          align-items: center;
          text-decoration: none;
         }
    </style>
</head>

<body>

    <div class="image-area">
        <a href="assign6image2.html">
            <img src="eye-blink.gif" alt=" ">
        </a>
    </div>

    <div class="analysis-block">
        <p>
          Blink to double check reality ... <br>
          <a href = "assign6image2.html">Continued ...</a>
        </p>
    </div>

</body>
</html>
