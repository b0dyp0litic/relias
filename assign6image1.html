<!doctype html>
<html lang="en">
<head>
    <title> assignment 6 : image 1</title>
    <style>
        body {
          margin: 0;
          padding: 0;
          height: 100vh;
          display: flex;
          flex-direction: column;
          /* Dark Blue from the outer edges of Screenshot 2026-05-12 at 11.01.03 AM.png */
          background-color: #194D8C; 
          overflow: hidden;
         }

        .image-area {
          flex: 1;
          display: flex;
          justify-content: center;
          align-items: center;
          overflow: hidden;
          /* Light Grey from the inner background of the eye image */
          background-color: #CCCCCC; 
         }

        .image-area img {
          max-width: 100%;
          max-height: 100%;
          object-fit: contain;
          display: block;
         }

        .analysis-block {
          width: 100vw;
          /* Dark Blue to match the body, creating a seamless look */
          background-color: #194D8C;
          padding: 25px 5%;
          box-sizing: border-box;
          flex-shrink: 0;
          /* Vibrant Magenta/Purple from the eye's lids for the border */
          border-top: 4px solid #9E2A8E;
        }

        .analysis-block p {
          /* White text for high contrast on the dark blue background */
          color: #FFFFFF;
          margin: 0 auto;
          max-width: 1000px;
          line-height: 1.6;
          font-family: sans-serif;
         }

        /* Specific link styling within the text block */
        .analysis-block a {
          display: inline; /* Overriding your global 'a' flex setting for the text link */
          color: #9E2A8E; /* Magenta/Purple to match the eye accents */
          font-weight: bold;
          text-decoration: underline;
        }

        /* The main image link container */
        .image-link {
          display: flex;
          height: 100%;
          width: 100%;
          justify-content: center;
          align-items: center;
          text-decoration: none;
         }
    </style>
</head>

<body>

    <div class="image-area">
        <a href="assign6image2.html" class="image-link">
            <img src="eye-blink.gif" alt="Blinking Eye">
        </a>
    </div>

    <div class="analysis-block">
        <p>
          Blink to double check reality ... <br>
          <a href="assign6image2.html">Continued ...</a>
        </p>
    </div>

</body>
</html>
