<!doctype html>
<html lang="en">
<head>
    <title>assignment 2 : photo 1</title>
    <style>
        html, body {
          margin: 0;
          padding: 0;
          height: 100%; /* Force the page to be exactly the screen size */
          overflow: hidden; /* Prevents scrollbars */
        }

        body {
          display: flex;
          flex-direction: column;
          background-color: #6FA397;
        }

        .image-area {
          flex: 1; /* This will take up all "leftover" space */
          display: flex;
          flex-direction: row;
          min-height: 0; /* CRITICAL: Allows this container to shrink smaller than its content */
        }

        .image-link {
          flex: 1;
          display: block;
          text-decoration: none;
          border: 2px solid #7D6FA3;
          overflow: hidden;
        }

        .image-link + .image-link {
          border-left: none;
        }

        .image-link img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
        }

        .analysis-block {
          background-color: #95A36F;
          padding: 25px 5%;
          border-top: 2px solid #7D6FA3;
          flex-shrink: 0; /* Ensures the footer never shrinks */
        }

        .analysis-block p {
          color: #7D6FA3;
          margin: 0 auto;
          max-width: 1000px;
          line-height: 1.6;
          font-family: sans-serif;
        }
    </style>
</head>

<body>

    <div class="image-area">
        <a href="assign5image2.html" class="image-link">
        <img src="Pattern 1.png" alt=" ">
        </a>

        <a href="assign5image2.html" class="image-link">
        <img src="Pattern 2.png" alt=" ">
        </a>
    </div>

    <div class="analysis-block">
        <p>
          Placeholder Text ....
        </p>
    </div>

</body>
</html>
