<!doctype html>
<html lang="en">
<head>
    <title> assignment 5 : image 2</title>
    <style>
        body {
          margin: 0;
          padding: 0;
          height: 100vh;
          display: flex;
          flex-direction: column;
          background-color: #194D8C;
          overflow: hidden;
        }

        .image-area {
          flex: 1;
          display: flex;
          justify-content: center; /* Centers horizontally */
          align-items: center;     /* Centers vertically */
          overflow: hidden;
        }

        .image-area a {
          display: block;          /* Changed from flex to block */
          height: 100%;            /* Ensure link fills height */
        }

        .image-area img {
          display: block;
          height: 100%;            /* Forces height to fit container */
          width: auto;             /* Allows width to scale proportionally */
          object-fit: contain;     /* Keeps image aspect ratio */
        }

        .analysis-block {
          width: 100vw;
          background-color: #333333;
          padding: 25px 5%;
          box-sizing: border-box;
          flex-shrink: 0;
          border-top: 1px solid #9E005D;
        }

        .analysis-block p {
          color: #9E005D;
          margin: 0 auto;
          max-width: 1000px;
          line-height: 1.6;
          font-family: sans-serif;
        }

        /* Removed global 'a' styles that were overriding the image container */
    </style>
</head>

<body>

    <div class="image-area">
        <a href="contents.html">
            <img src="Apron.png" alt=" ">
        </a>
    </div>

    <div class="analysis-block">
        <p>
          Coming Soon ...<br>
          <a href="contents.html">Continued ...</a>
        </p>
    </div>

</body>
</html>
