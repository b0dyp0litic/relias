<!doctype html>
<html lang="en">
<head>
    <title>assignment 2 : photo 1</title>
    <style>
        html, body {
          margin: 0;
          padding: 0;
          height: 100%; /* Force the page to be exactly the screen size */
          overflow: hidden; /* Prevents scrollbars */
        }

        body {
          display: flex;
          flex-direction: column;
          /* Dark charcoal from the glasses frames */
          background-color: #0D0D0D;
        }

        .image-area {
          flex: 1; /* This will take up all "leftover" space */
          display: flex;
          flex-direction: row;
          min-height: 0; /* CRITICAL: Allows this container to shrink smaller than its content */
          justify-content: center;
        }

        .image-link {
          flex: 1;
          display: flex;
          justify-content: center;
          text-decoration: none;
          /* Removed the border from here */
          overflow: hidden;
        }

        .image-link img {
          height: 100%; /* Stretches the image top to bottom */
          width: auto;   /* Maintains aspect ratio */
          display: block;
        }

        .analysis-block {
          /* Deep purple-black from the shadows */
          background-color: #1A0B21;
          padding: 25px 5%;
          /* This is the only line remaining: between the image and text */
          border-top: 2px solid #D18EC2;
          flex-shrink: 0; /* Ensures the footer never shrinks */
        }

        .analysis-block p {
          /* Violet highlight for the text */
          color: #D18EC2;
          margin: 0 auto;
          max-width: 1000px;
          line-height: 1.6;
          font-family: sans-serif;
        }
    </style>
</head>

<body>

    <div class="image-area">
        <a href="contents.html" class="image-link">
        <img src="Apron.png" alt=" ">
        </a>
    </div>

    <div class="analysis-block">
        <p>
        First pattern on an apron worn by a strange AI man.
        </p>
    </div>

</body>
</html>
